<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CareerOS GCC" />
    <meta name="theme-color" content="#C9A84C" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="CareerOS" />
    <title>CareerOS GCC</title>
    <link rel="icon" type="image/svg+xml" href="/careeros-gcc/favicon.svg" />
    <link rel="manifest" href="/careeros-gcc/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:'DM Sans',sans-serif;background:#0A1628;color:#EEF2F7;min-height:100vh}
      #gate{
        min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
        background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,0.08) 0%,transparent 60%),#0A1628;
      }
      .gb{
        width:100%;max-width:400px;background:#0F1E35;
        border:1px solid rgba(201,168,76,0.25);border-radius:22px;padding:44px 38px;
        text-align:center;box-shadow:0 8px 48px rgba(0,0,0,0.5);
      }
      .gl{
        width:54px;height:54px;background:linear-gradient(135deg,#C9A84C,#7A6430);
        border-radius:15px;display:flex;align-items:center;justify-content:center;
        font-size:28px;font-weight:800;color:#0A1628;margin:0 auto 22px;
        font-family:'Playfair Display',serif;box-shadow:0 4px 20px rgba(201,168,76,0.3);
      }
      .gt{font-family:'Playfair Display',serif;font-size:24px;color:#EEF2F7;margin-bottom:6px;font-weight:700}
      .gs{font-size:13px;color:#5A7A95;margin-bottom:30px;line-height:1.5}
      #pi{
        width:100%;background:#152237;border:1.5px solid rgba(255,255,255,0.08);
        border-radius:11px;padding:14px 18px;font-size:16px;font-family:'DM Sans',sans-serif;
        color:#EEF2F7;outline:none;text-align:center;letter-spacing:4px;margin-bottom:14px;
        transition:border-color 0.2s,box-shadow 0.2s;
      }
      #pi:focus{border-color:#C9A84C;box-shadow:0 0 0 3px rgba(201,168,76,0.12)}
      #pi::placeholder{letter-spacing:1px;color:#3A5570;font-size:14px}
      #pb{
        width:100%;padding:14px;background:linear-gradient(135deg,#C9A84C,#7A6430);
        border:none;border-radius:11px;color:#0A1628;font-size:15px;font-weight:700;
        font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity 0.2s;
      }
      #pb:hover{opacity:0.9}
      #pe{margin-top:14px;font-size:13px;color:#C05A5A;display:none}
      @keyframes sh{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
      .shake{animation:sh 0.3s ease}
    </style>
  </head>
  <body>
    <div id="gate">
      <div class="gb" id="gbox">
        <div class="gl">C</div>
        <div class="gt">CareerOS GCC</div>
        <div class="gs">Your career management platform<br/>Enter your access password to continue</div>
        <input id="pi" type="password" placeholder="Enter password" autocomplete="off" />
        <button id="pb">Enter CareerOS</button>
        <div id="pe">Incorrect password. Please try again.</div>
      </div>
    </div>
    <div id="root" style="display:none"></div>
    <script>
      var P='gcc2025';
      function unlock(){
        try{localStorage.setItem('co_access',P);}catch(e){}
        document.getElementById('gate').style.display='none';
        document.getElementById('root').style.display='block';
        if('serviceWorker' in navigator){
          navigator.serviceWorker.register('/careeros-gcc/sw.js').catch(function(){});
        }
      }
      function check(){
        var v=document.getElementById('pi').value;
        if(v===P){
          unlock();
        } else {
          document.getElementById('pe').style.display='block';
          document.getElementById('pi').value='';
          var b=document.getElementById('gbox');
          b.classList.remove('shake');
          void b.offsetWidth;
          b.classList.add('shake');
          setTimeout(function(){document.getElementById('pi').focus();},50);
        }
      }
      document.getElementById('pb').addEventListener('click',check);
      document.getElementById('pi').addEventListener('keydown',function(e){if(e.key==='Enter')check();});
      try{if(localStorage.getItem('co_access')===P)unlock();}catch(e){}
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
